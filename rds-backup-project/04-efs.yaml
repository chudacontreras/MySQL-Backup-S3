AWSTemplateFormatVersion: '2010-09-09'
Description: Crear un EFS para almacenar backups de RDS

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-0x1y2z3a4b5c6d7e8
    Description: VPC donde se crea el EFS

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-0a1b2c3d4e5f6g7h8
    Description: Subred para Mount Target

Resources:

  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      Tags:
        - Key: Name
          Value: rds-backup-efs

  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: SG para permitir acceso NFS desde EC2
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: 10.0.0.0/16

  MountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref SubnetId
      SecurityGroups:
        - !Ref EFSSecurityGroup

Outputs:
  FileSystemId:
    Value: !Ref EFSFileSystem
    Export:
      Name: RDSBackupEFSId
  EFSSecurityGroup:
    Value: !Ref EFSSecurityGroup
