AWSTemplateFormatVersion: '2010-09-09'
Description: Stack para lanzar una EC2 con IAM Role para SSM + S3 backup

Parameters:
  InstanceType:
    Type: String
    Default: t3.medium
    Description: Tipo de instancia EC2

  AmiId:
    Type: AWS::EC2::Image::Id
    Default: ami-0abcdef1234567890
    Description: AMI de Amazon Linux 2

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-0a1b2c3d4e5f6g7h8
    Description: Subnet donde se lanzará la instancia

  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-0x1y2z3a4b5c6d7e8
    Description: VPC para el Security Group

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: my-keypair-example
    Description: Nombre del par de claves SSH

  InstanceName:
    Type: String
    Default: RDSBackupInstance
    Description: Nombre para la instancia EC2

Resources:

  # IAM Role con permisos para SSM y S3
  RDSBackupRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
      Path: /

  # Instance Profile asociado al Role
  RDSBackupInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref RDSBackupRole
      Path: /

  # Security Group con acceso MySQL (interno) y SSH (externo)
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow MySQL from VPC and SSH from internet
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 10.0.0.0/16
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  # EC2 Instancia con Amazon Linux 2
  RDSBackupInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref AmiId
      KeyName: !Ref KeyName
      SubnetId: !Ref SubnetId
      IamInstanceProfile: !Ref RDSBackupInstanceProfile
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y mysql aws-cli
         # curl -o /home/ec2-user/cronjob.sh https://s3.amazonaws.com/YOUR-BUCKET-NAME/scripts/cronjob.sh
         # chmod +x /home/ec2-user/cronjob.sh
         # echo "0 6 4 7 * root /home/ec2-user/cronjob.sh >> /var/log/rds-backup.log 2>&1" >> /etc/crontab
      Tags:
        - Key: Name
          Value: !Ref InstanceName

Outputs:
  InstanceId:
    Description: ID de la instancia EC2 creada
    Value: !Ref RDSBackupInstance

  InstancePublicIP:
    Description: IP pública (si aplica)
    Value: !GetAtt RDSBackupInstance.PublicIp

  RoleName:
    Description: Nombre del role asociado
    Value: !Ref RDSBackupRole
